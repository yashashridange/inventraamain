<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Inventraa Admin Login
</title>

<style>

body{
margin:0;
padding:0;
font-family:Arial;
background:#f4f6f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{

background:white;

padding:35px;

width:320px;

border-radius:12px;

box-shadow:0 0 15px rgba(0,0,0,0.1);

text-align:center;

}

h1{

color:#0a2342;

margin-bottom:25px;

}

input{

width:100%;

padding:12px;

margin:10px 0;

border:1px solid #ccc;

border-radius:6px;

font-size:15px;

box-sizing:border-box;

}

button{

width:100%;

padding:12px;

background:#0a2342;

color:white;

border:none;

border-radius:6px;

font-size:16px;

cursor:pointer;

margin-top:10px;

}

button:hover{

background:#163d6b;

}

.small{

margin-top:15px;

font-size:14px;

color:gray;

}

</style>

</head>

<body>

<div class="login-box">

<h1>
🔐 Admin Login
</h1>

<input
type="email"
id="email"
placeholder="Enter Admin Email"
>

<input
type="password"
id="password"
placeholder="Enter Password"
>

<button onclick="login()">
Login
</button>

<div class="small">

Inventraa Store Management

</div>

</div>

<script type="module">

import app from "./firebase.js";

import {
getAuth,
signInWithEmailAndPassword,
setPersistence,
browserLocalPersistence
}
from
"https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const auth =
getAuth(app);

//
// KEEP LOGIN ACTIVE
//
await setPersistence(
auth,
browserLocalPersistence
);

//
// LOGIN FUNCTION
//
window.login =
async function(){

const email =
document.getElementById(
"email"
).value;

const password =
document.getElementById(
"password"
).value;

//
// ONLY ADMIN LOGIN
//
if(
email !== "test@gmail.com"
){

alert(
"Only Admin Login Allowed"
);

return;

}

if(!email || !password){

alert(
"Enter Email & Password"
);

return;

}

try{

await signInWithEmailAndPassword(
auth,
email,
password
);

localStorage.setItem(
"isLoggedIn",
"true"
);

window.location.href =
"./dashboard.html";

}
catch(error){

console.log(error);

alert(
"Invalid Email or Password"
);

}

};

</script>

</body>

</html>
