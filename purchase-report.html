<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Purchase Report</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f7fa;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0px 0px 15px rgba(0,0,0,0.08);
    }

    h1 {
      text-align: center;
      color: #0a2342;
      margin-bottom: 25px;
    }

    h2 {
      margin-top: 20px;
      color: #0a2342;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      font-size: 16px;
      border-radius: 6px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    button {
      background: #0a2342;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #163d6b;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 12px;
      text-align: center;
    }

    th {
      background: #0a2342;
      color: white;
    }

    tr:nth-child(even) {
      background: #f9f9f9;
    }

    .header-box {
      background: #0a2342;
      color: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
      text-align: center;
      font-size: 18px;
    }

  </style>
</head>
<body>

<div class="container">

  <div class="header-box">
    📦 Purchase Management System
  </div>

  <h1>🧾 Purchase Report</h1>

  <!-- ADD PURCHASE -->
  <h2>Add Purchase</h2>

  <input type="text" id="pName" placeholder="Enter Product Name">
  <input type="number" id="pQty" placeholder="Enter Quantity">

  <button onclick="addPurchase()">Add Purchase</button>

  <!-- PURCHASE TABLE -->
  <h2>📋 Purchase History</h2>

  <table id="purchaseTable">
    <tr>
      <th>Product Name</th>
      <th>Quantity</th>
      <th>Date</th>
    </tr>
  </table>

</div>

<script src="notification.js"></script>

<script type="module" src="purchase.js"></script>

</body>
</html>
