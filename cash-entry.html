<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Cash / Bank Entry</title>

<style>

body{
font-family:Arial;
padding:20px;
background:#f4f6f9;
}

.container{
background:white;
padding:20px;
border-radius:10px;
}

h1{
color:#0a2342;
}

.form-box{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:20px;
}

input,
select{
width:220px;
padding:10px;
border:1px solid #ccc;
border-radius:6px;
}

button{
padding:10px 18px;
background:#0a2342;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

th{
background:#0a2342;
color:white;
}

</style>

</head>

<body>

<div class="container">

<h1>💰 Cash / Bank Quick Entry</h1>

<div class="form-box">

<select id="type">

<option value="Cash">
Cash
</option>

<option value="Bank">
Bank
</option>

</select>

<select id="entryType">

<option value="Credit">
Credit
</option>

<option value="Debit">
Debit
</option>

</select>

<input
type="number"
id="amount"
placeholder="Amount">

<input
type="text"
id="note"
placeholder="Note">

<button onclick="saveEntry()">
Save Entry
</button>

</div>

<table id="entryTable">

<tr>

<th>Date</th>

<th>Mode</th>

<th>Type</th>

<th>Amount</th>

<th>Note</th>

</tr>

</table>

</div>

<script type="module"
src="cash-entry.js">
</script>
</body>
</html>
