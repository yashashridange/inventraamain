<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Dashboard
</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
display:flex;
}

.sidebar{

width:240px;

background:#0a2342;

height:100vh;

color:white;

padding-top:20px;

position:fixed;

}

.logo{

text-align:center;

font-size:24px;

font-weight:bold;

margin-bottom:30px;

}

.sidebar button{

width:90%;

margin:10px;

padding:14px;

border:none;

background:#163d6b;

color:white;

font-size:16px;

border-radius:8px;

cursor:pointer;

text-align:left;

}

.sidebar button:hover{

background:#1d4f87;

}

.main{

margin-left:240px;

padding:20px;

width:100%;

}

.topbar{

background:white;

padding:20px;

border-radius:10px;

box-shadow:0 0 10px rgba(0,0,0,0.1);

margin-bottom:20px;

}

iframe{

width:100%;

height:85vh;

border:none;

background:white;

border-radius:10px;

box-shadow:0 0 10px rgba(0,0,0,0.1);

}

.status{

margin-top:10px;

font-size:14px;

color:green;

font-weight:bold;

}

</style>

</head>

<body>

<div class="sidebar">

<div class="logo">

📦 Inventraa

</div>

<button onclick="loadPage('inventory.html')">

📦 Inventory

</button>

<button onclick="loadPage('billing.html')">

🧾 Billing

</button>

<button onclick="loadPage('report.html')">

📊 Sales Report

</button>

<button onclick="loadPage('purchase.html')">

📦 Purchase Report

</button>

<button onclick="loadPage('cash-entry.html')">

💰 Cash / Bank

</button>

</div>

<div class="main">

<div class="topbar">

<h2>
Matoshree Mart
</h2>

<div class="status">

🟢 System Active

</div>

</div>

<iframe
id="contentFrame"
src="inventory.html">
</iframe>

</div>

<script>

window.loadPage =
function(page){

document.getElementById(
"contentFrame"
).src = page;

};

</script>

</body>

</html>
