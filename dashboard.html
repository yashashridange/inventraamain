<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Inventraa Dashboard
</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Arial;

background:#f4f6f9;

display:flex;

}

/* SIDEBAR */

.sidebar{

width:240px;

height:100vh;

background:#0a2342;

color:white;

position:fixed;

left:0;

top:0;

padding-top:20px;

}

.logo{

text-align:center;

font-size:26px;

font-weight:bold;

margin-bottom:30px;

}

.sidebar button{

width:90%;

margin:10px;

padding:14px;

border:none;

background:#163d6b;

color:white;

font-size:16px;

border-radius:8px;

cursor:pointer;

text-align:left;

transition:0.3s;

}

.sidebar button:hover{

background:#215a99;

}

/* MAIN */

.main{

margin-left:240px;

width:calc(100% - 240px);

padding:20px;

}

/* TOPBAR */

.topbar{

background:white;

padding:20px;

border-radius:12px;

box-shadow:0 0 10px rgba(0,0,0,0.1);

margin-bottom:20px;

}

.topbar h2{

color:#0a2342;

margin-bottom:8px;

}

.status{

color:green;

font-weight:bold;

}

/* FRAME */

iframe{

width:100%;

height:82vh;

border:none;

background:white;

border-radius:12px;

box-shadow:0 0 10px rgba(0,0,0,0.1);

}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">

📦 Inventraa

</div>

<button onclick="loadPage('inventory.html')">

📦 Inventory

</button>

<button onclick="loadPage('billing.html')">

🧾 Billing

</button>

<button onclick="loadPage('report.html')">

📊 Sales Report

</button>

<button onclick="loadPage('purchase.html')">

📦 Purchase Report

</button>

<button onclick="loadPage('cash-entry.html')">

💰 Cash / Bank

</button>

</div>

<!-- MAIN -->

<div class="main">

<div class="topbar">

<h2>

Matoshree Mart

</h2>

<div class="status">

🟢 System Active

</div>

</div>

<iframe
id="contentFrame"
src="inventory.html">
</iframe>

</div>

<script>

window.loadPage =
function(page){

document.getElementById(
"contentFrame"
).src = page;

};

</script>

</body>

</html>
