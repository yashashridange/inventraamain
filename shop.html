<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nearby Shops - Inventraa</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #0a2342;
      margin-bottom: 30px;
    }

    .shop-box {
      width: 80%;
      margin: 15px auto;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 6px 15px rgba(0,0,0,0.08);
    }

    .shop-box h2 {
      color: #0a2342;
      margin-bottom: 10px;
    }

    .shop-box p {
      color: #555;
    }

    button {
      margin-top: 10px;
      padding: 10px 18px;
      background: #0a2342;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>🏪 Nearby Shops</h1>

  <div class="shop-box">
    <h2>Fresh Mart Grocery</h2>
    <p>2 km away • Open Now</p>
    <button onclick="location.href='purchase.html'">
      Shop Now
    </button>
  </div>

  <div class="shop-box">
    <h2>Daily Needs Store</h2>
    <p>1.5 km away • Open Now</p>
    <button onclick="location.href='purchase.html'">
      Shop Now
    </button>
  </div>

  <div class="shop-box">
    <h2>Smart Super Market</h2>
    <p>3 km away • Open Now</p>
    <button onclick="location.href='purchase.html'">
      Shop Now
    </button>
  </div>

</body>
</html>
