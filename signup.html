<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Signup</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
width:320px;
}

h1{
text-align:center;
color:#0a2342;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:6px;
}

button{
width:100%;
padding:12px;
background:#0a2342;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#163d6b;
}

p{
text-align:center;
margin-top:15px;
}

a{
color:#0a2342;
text-decoration:none;
font-weight:bold;
}

</style>

</head>

<body>

<div class="box">

<h1>
📝 Signup
</h1>

<input
type="email"
id="email"
placeholder="Enter Email"
>

<input
type="password"
id="password"
placeholder="Enter Password"
>

<button onclick="signup()">
Signup
</button>

<p>

Already have account?

<a href="./login.html">
Login
</a>

</p>

</div>

<script type="module">

import app from "./firebase.js";

import {
getAuth,
createUserWithEmailAndPassword
}
from
"https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const auth =
getAuth(app);

window.signup =
async function(){

const email =
document.getElementById(
"email"
).value;

const password =
document.getElementById(
"password"
).value;

if(!email || !password){

alert(
"Enter Email & Password"
);

return;

}

try{

await createUserWithEmailAndPassword(
auth,
email,
password
);

alert(
"Signup Successful"
);

window.location.href =
"./login.html";

}
catch(error){

console.log(error);

alert(
error.message
);

}

};

</script>

</body>

</html>
